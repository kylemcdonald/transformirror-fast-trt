<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Transformirror Control</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #1a1f23;
      --line: #343b42;
      --text: #eef2f4;
      --muted: #9aa5ad;
      --accent: #52c7b8;
      --accent-2: #f0b45b;
      --danger: #e76f6f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(980px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
      letter-spacing: 0;
    }

    #status {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 18px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 650;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    textarea,
    input[type="number"] {
      width: 100%;
      background: #0d1012;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      padding: 10px 11px;
      outline: none;
    }

    textarea {
      min-height: 148px;
      resize: vertical;
    }

    textarea:focus,
    input[type="number"]:focus {
      border-color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 86px;
      gap: 12px;
      align-items: center;
      margin: 14px 0;
    }

    .field {
      margin: 14px 0;
    }

    .toggle {
      align-items: center;
      color: var(--text);
      display: flex;
      font-size: 14px;
      gap: 10px;
      margin: 14px 0;
      text-transform: none;
    }

    .toggle input {
      accent-color: var(--accent);
      height: 18px;
      margin: 0;
      width: 18px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #242b30;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-weight: 650;
      padding: 9px 12px;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #06201d;
    }

    button.secondary {
      background: #2c2520;
      border-color: #614b31;
      color: #ffd69a;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 9px 14px;
      margin: 0;
    }

    .status-group {
      grid-column: 1 / -1;
      border-top: 1px solid var(--line);
      color: var(--text);
      font-size: 12px;
      font-weight: 750;
      margin-top: 6px;
      padding-top: 10px;
      text-transform: uppercase;
    }

    .status-group:first-child {
      border-top: 0;
      margin-top: 0;
      padding-top: 0;
    }

    .status-label {
      color: var(--muted);
    }

    .status-value {
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .error {
      color: var(--danger);
      overflow-wrap: anywhere;
    }

    @media (max-width: 760px) {
      main { width: min(100vw - 20px, 980px); padding-top: 18px; }
      header { align-items: flex-start; flex-direction: column; }
      #status { white-space: normal; }
      .layout { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr 74px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Transformirror Control</h1>
      <div id="status">Connecting</div>
    </header>

    <div class="layout">
      <section>
        <h2>Effect</h2>
        <label for="prompt" title='OSC: /prompt "a psychedelic landscape"'>Prompt</label>
        <textarea id="prompt" spellcheck="false" title='OSC: /prompt "a psychedelic landscape"'></textarea>

        <div class="row">
          <div>
            <label for="strength" title="OSC: /strength 0.7">Strength</label>
            <input id="strength" type="range" min="0" max="1" step="0.01" title="OSC: /strength 0.7">
          </div>
          <input id="strengthNumber" type="number" min="0" max="1" step="0.01" title="OSC: /strength 0.7">
        </div>

        <div class="row">
          <div>
            <label for="blend" title="OSC: /blend 0.5, or /passthrough true for raw input">Blend</label>
            <input id="blend" type="range" min="0" max="1" step="0.01" title="OSC: /blend 0.5, or /passthrough true for raw input">
          </div>
          <input id="blendNumber" type="number" min="0" max="1" step="0.01" title="OSC: /blend 0.5, or /passthrough true for raw input">
        </div>

        <label class="toggle" for="leftRightFlip" title="OSC: /left_right_flip true">
          <input id="leftRightFlip" type="checkbox" title="OSC: /left_right_flip true">
          <span>Left-right flip</span>
        </label>

        <div class="field">
          <label for="width" title="Changes build and switch to matching TensorRT engines automatically">Width</label>
          <input id="width" type="number" min="256" max="1280" step="32" title="Changes build and switch to matching TensorRT engines automatically">
        </div>

        <div class="field">
          <label for="height" title="Changes build and switch to matching TensorRT engines automatically">Height</label>
          <input id="height" type="number" min="256" max="1280" step="32" title="Changes build and switch to matching TensorRT engines automatically">
        </div>

        <div class="buttons" id="resolutionButtons"></div>

        <div class="field">
          <label for="seed" title="OSC: /seed 42">Seed</label>
          <input id="seed" type="number" step="1" title="OSC: /seed 42">
        </div>

        <div class="row">
          <div>
            <label for="steps" title="OSC: /steps 2">Steps</label>
            <input id="steps" type="range" min="2" max="8" step="1" title="OSC: /steps 2">
          </div>
          <input id="stepsNumber" type="number" min="2" max="8" step="1" title="OSC: /steps 2">
        </div>

        <div class="buttons">
          <button class="primary" id="apply">Apply</button>
          <button id="raw" title="OSC: /passthrough true, or /blend 0">Raw</button>
          <button id="processed" title="OSC: /passthrough false, or /blend 1">Processed</button>
          <button class="secondary" id="randomSeed" title="OSC: /seed 123456">Random Seed</button>
        </div>
      </section>

      <section>
        <h2>Status</h2>
        <div class="status-grid">
          <div class="status-group">Camera</div>
          <div class="status-label">Status</div><div class="status-value" id="cameraReady">-</div>
          <div class="status-label">Mode</div><div class="status-value" id="cameraMode">-</div>
          <div class="status-label">Crop</div><div class="status-value" id="cameraCrop">-</div>
          <div class="status-label">FPS</div><div class="status-value" id="cameraFps">-</div>

          <div class="status-group">Diffusion</div>
          <div class="status-label">Status</div><div class="status-value" id="modelReady">-</div>
          <div class="status-label">Resolution</div><div class="status-value" id="resolution">-</div>
          <div class="status-label">Time</div><div class="status-value" id="diffusionMs">-</div>
          <div class="status-label">Conditioning</div><div class="status-value" id="conditioningMs">-</div>
          <div class="status-label">FPS</div><div class="status-value" id="diffusionFps">-</div>

          <div class="status-group">Network</div>
          <div class="status-label">HTTP Port</div><div class="status-value" id="httpPort">-</div>
          <div class="status-label">OSC Port</div><div class="status-value" id="oscPort">-</div>

          <div class="status-group">Display</div>
          <div class="status-label">Resolution</div><div class="status-value" id="displayResolution">-</div>
          <div class="status-label">FPS</div><div class="status-value" id="displayFps">-</div>

          <div class="status-group">Error</div>
          <div class="status-label">Last</div><div class="status-value error" id="lastError">-</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let applyingRemote = false;
    let debounceTimer = null;
    let blendInFlight = false;
    let pendingBlend = null;
    let resolutionButtonsKey = "";

    function setStatus(text) {
      $("status").textContent = text;
    }

    function isFocused(...ids) {
      return ids.some((id) => document.activeElement === $(id));
    }

    function setValueIfIdle(id, value) {
      if (!isFocused(id)) {
        $(id).value = value;
      }
    }

    function setPair(rangeId, numberId, value) {
      if (isFocused(rangeId, numberId)) return;
      $(rangeId).value = value;
      $(numberId).value = value;
    }

    async function postState(update) {
      const res = await fetch("/api/state", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(update)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function collectState() {
      return {
        prompt: $("prompt").value,
        strength: Number($("strength").value),
        blend: Number($("blend").value),
        left_right_flip: $("leftRightFlip").checked,
        width: Number($("width").value),
        height: Number($("height").value),
        seed: Number($("seed").value),
        steps: Number($("steps").value)
      };
    }

    async function apply(update = collectState()) {
      try {
        const state = await postState(update);
        render(state, true);
        setStatus("Updated");
      } catch (err) {
        setStatus(`Update failed: ${err.message}`);
      }
    }

    function debounceApply(update) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => apply(update), 120);
    }

    async function flushBlend() {
      if (blendInFlight) return;
      blendInFlight = true;
      try {
        while (pendingBlend !== null) {
          const blend = pendingBlend;
          pendingBlend = null;
          await postState({ blend });
        }
      } catch (err) {
        setStatus(`Blend update failed: ${err.message}`);
      } finally {
        blendInFlight = false;
        if (pendingBlend !== null) {
          flushBlend();
        }
      }
    }

    function sendBlend(value) {
      pendingBlend = Number(value);
      flushBlend();
    }

    function renderResolutionButtons(state) {
      const cached = state.config.cached_resolutions || [];
      const key = cached.map((res) => `${res.width}x${res.height}`).join(",");
      if (key === resolutionButtonsKey) return;
      resolutionButtonsKey = key;
      const container = $("resolutionButtons");
      container.replaceChildren();
      if (!cached.length) {
        const empty = document.createElement("button");
        empty.type = "button";
        empty.disabled = true;
        empty.textContent = "No cached resolutions";
        container.appendChild(empty);
        return;
      }
      cached.forEach((res) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = `${res.width} x ${res.height}`;
        button.title = "Cached TensorRT build";
        button.addEventListener("click", () => apply({ width: res.width, height: res.height }));
        container.appendChild(button);
      });
    }

    function render(state, keepPromptFocus = false) {
      applyingRemote = true;
      const controls = state.controls;
      renderResolutionButtons(state);
      if (!isFocused("prompt") && !(keepPromptFocus && document.activeElement === $("prompt"))) {
        $("prompt").value = controls.prompt;
      }
      setPair("strength", "strengthNumber", controls.strength);
      setPair("blend", "blendNumber", controls.blend);
      $("leftRightFlip").checked = Boolean(controls.left_right_flip ?? state.left_right_flip);
      const changingSize = state.status.resolution_changing;
      const visibleWidth = changingSize ? state.config.requested_width : state.config.width;
      const visibleHeight = changingSize ? state.config.requested_height : state.config.height;
      if (!isFocused("width", "height")) {
        $("width").value = visibleWidth;
        $("height").value = visibleHeight;
      }
      setValueIfIdle("seed", controls.seed);
      setPair("steps", "stepsNumber", controls.steps);

      $("cameraReady").textContent = state.status.camera_ready ? "Ready" : "Waiting";
      $("modelReady").textContent = changingSize ? "Building size" : (state.status.model_ready ? "Ready" : "Loading");
      $("resolution").textContent = changingSize
        ? `${state.config.width} x ${state.config.height} -> ${visibleWidth} x ${visibleHeight}`
        : `${state.config.width} x ${state.config.height}`;
      $("displayResolution").textContent = `${state.stats.display_width} x ${state.stats.display_height}`;
      $("cameraMode").textContent = `${state.stats.camera_source_width} x ${state.stats.camera_source_height}`;
      $("cameraCrop").textContent = `${state.stats.camera_crop_width} x ${state.stats.camera_crop_height}`;
      $("cameraFps").textContent = state.stats.camera_fps.toFixed(2);
      $("displayFps").textContent = state.stats.display_fps.toFixed(2);
      $("diffusionMs").textContent = `${state.stats.diffusion_ms.toFixed(1)} ms`;
      $("conditioningMs").textContent = `${(state.stats.conditioning_ms || 0).toFixed(1)} ms`;
      $("diffusionFps").textContent = state.stats.diffusion_fps.toFixed(2);
      $("oscPort").textContent = state.config.osc_port;
      $("httpPort").textContent = state.config.http_port;
      $("lastError").textContent = state.status.last_error || "-";
      applyingRemote = false;
    }

    async function poll() {
      try {
        const res = await fetch("/api/state");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const state = await res.json();
        render(state);
        setStatus(state.status.message || "Connected");
      } catch (err) {
        setStatus(`Disconnected: ${err.message}`);
      }
    }

    $("apply").addEventListener("click", () => apply());
    $("raw").addEventListener("click", () => apply({ blend: 0 }));
    $("processed").addEventListener("click", () => apply({ blend: 1 }));
    $("leftRightFlip").addEventListener("change", () => apply({ left_right_flip: $("leftRightFlip").checked }));
    $("prompt").addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
        event.preventDefault();
        apply({ prompt: $("prompt").value });
      }
    });
    $("randomSeed").addEventListener("click", () => {
      const seed = Math.floor(Math.random() * 2147483647);
      $("seed").value = seed;
      apply({ seed });
    });

    [["strength", "strengthNumber"], ["steps", "stepsNumber"]].forEach(([rangeId, numberId]) => {
      $(rangeId).addEventListener("input", () => {
        if (applyingRemote) return;
        $(numberId).value = $(rangeId).value;
        debounceApply({ [rangeId]: Number($(rangeId).value) });
      });
      $(numberId).addEventListener("input", () => {
        if (applyingRemote) return;
        $(rangeId).value = $(numberId).value;
        debounceApply({ [rangeId]: Number($(numberId).value) });
      });
    });

    $("blend").addEventListener("input", () => {
      if (applyingRemote) return;
      $("blendNumber").value = $("blend").value;
      sendBlend($("blend").value);
    });
    $("blendNumber").addEventListener("input", () => {
      if (applyingRemote) return;
      $("blend").value = $("blendNumber").value;
      sendBlend($("blendNumber").value);
    });

    $("seed").addEventListener("change", () => apply({ seed: Number($("seed").value) }));
    $("width").addEventListener("change", () => apply({
      width: Number($("width").value),
      height: Number($("height").value)
    }));
    $("height").addEventListener("change", () => apply({
      width: Number($("width").value),
      height: Number($("height").value)
    }));

    poll();
    setInterval(poll, 1000);
  </script>
</body>
</html>
